<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課題チェック表</title>
<style>
  :root {
    --bg: #1a1816;
    --panel: #242120;
    --line: #3a3633;
    --text: #f0ece4;
    --sub: #9a948c;
    --accent: #e8a33d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    padding: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 4px;
    letter-spacing: 0.02em;
  }
  .sub {
    color: var(--sub);
    font-size: 12px;
    margin-bottom: 10px;
  }
  .summary {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .summary .big {
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
  }
  .summary .label {
    font-size: 12px;
    color: var(--sub);
  }
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  button:active { background: #2e2a27; }
  button.danger { color: #e07a5f; border-color: #5a3a32; }
  button.primary { background: var(--accent); color: #1a1410; border: none; font-weight: 600; }
  .col-set-label {
    font-size: 13px;
    color: var(--sub);
    align-self: center;
  }
  .col-count-input {
    width: 60px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
  }

  .scroll-wrap {
    overflow-x: auto;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--panel);
  }
  table {
    border-collapse: collapse;
    min-width: 100%;
  }
  th, td {
    border-bottom: 1px solid var(--line);
    border-right: 1px solid var(--line);
    text-align: center;
    padding: 0;
  }
  th {
    background: #2a2724;
    font-size: 11px;
    color: var(--sub);
    padding: 6px 4px 4px;
    position: sticky;
    top: 0;
    min-width: 34px;
    line-height: 1.3;
  }
  th .col-count {
    display: block;
    font-size: 10px;
    color: var(--accent);
    font-weight: 600;
  }
  .corner {
    position: sticky;
    left: 0;
    z-index: 3;
    background: #2a2724;
  }
  .row-head {
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--panel);
    padding: 6px 10px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    min-width: 110px;
    text-align: left;
  }
  .row-head-top {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .row-head input.name-input {
    background: transparent;
    border: none;
    color: var(--text);
    width: 44px;
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    padding: 0;
  }
  .row-count {
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    margin-left: auto;
    white-space: nowrap;
  }
  .swatch {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: none;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
  }
  .progress-track {
    height: 4px;
    background: #3a3633;
    border-radius: 2px;
    margin-top: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.25s;
  }
  .cell {
    width: 36px;
    height: 36px;
    cursor: pointer;
  }
  .cell .box {
    width: 22px;
    height: 22px;
    margin: 0 auto;
    border-radius: 5px;
    border: 1.5px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: transparent;
  }
  .cell.checked .box {
    border-width: 0;
    color: #1a1410;
  }
  .del-row, .del-col {
    color: var(--sub);
    font-size: 11px;
    cursor: pointer;
    padding: 0 4px;
  }
  .move-btn {
    color: var(--sub);
    font-size: 11px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
  }
  .move-btn:active { color: var(--accent); }
  .move-btn.hidden { display: none; }
  #reorderBtn.active {
    background: var(--accent);
    color: #1a1410;
    border-color: var(--accent);
    font-weight: 600;
  }
  .footer {
    margin-top: 10px;
    font-size: 12px;
    color: var(--sub);
    display: flex;
    justify-content: flex-end;
  }
  .saved-flash {
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .saved-flash.show { opacity: 1; }
</style>
</head>
<body>

<h1>🧗 課題チェック表</h1>
<div class="sub">タップでチェックON/OFF。色の丸タップで色変更。自動保存されるで。</div>

<div class="summary">
  <span class="big" id="totalCount">0</span>
  <span class="label">本 完登</span>
</div>

<div class="toolbar">
  <button class="primary" onclick="addColumn()">＋列を追加</button>
  <button onclick="addRow()">＋色（行）を追加</button>
  <button class="danger" onclick="resetAll()">全部リセット</button>
  <button id="reorderBtn" onclick="toggleReorderMode()">↕ 並び替え</button>
</div>
<div class="toolbar">
  <span class="col-set-label">列数を</span>
  <input type="number" id="colCountInput" class="col-count-input" min="1" max="200">
  <span class="col-set-label">列に設定</span>
  <button class="primary" onclick="setColCount()">設定する</button>
</div>

<div class="scroll-wrap">
  <table id="grid"></table>
</div>

<div class="footer">
  <span class="saved-flash" id="savedFlash">保存したで✓</span>
</div>

<script>
const DEFAULT_COLORS = [
  { name: "緑", hex: "#3fae4d" },
  { name: "黄", hex: "#e8d44d" },
  { name: "橙", hex: "#e8893d" },
  { name: "紫", hex: "#9b59b6" },
  { name: "青", hex: "#3d8be8" },
  { name: "赤", hex: "#e85d4d" },
];
const STORAGE_KEY = "boulder_grid_v2";
const OLD_STORAGE_KEY = "boulder_grid_v1";
let state = null;
let reorderMode = false;

function defaultState() {
  return {
    rows: DEFAULT_COLORS.map(c => ({ name: c.name, hex: c.hex })),
    colCount: 16,
    checked: {} // "rowIdx_colIdx": true
  };
}

async function loadState() {
  try {
    const res = await window.storage.get(STORAGE_KEY, false);
    if (res && res.value) {
      state = JSON.parse(res.value);
      return;
    }
  } catch (e) { /* not found */ }

  // 旧バージョンのデータがあれば引き継ぐ
  try {
    const old = await window.storage.get(OLD_STORAGE_KEY, false);
    if (old && old.value) {
      state = JSON.parse(old.value);
      return;
    }
  } catch (e) { /* not found */ }

  state = defaultState();
}

let saveTimer = null;
let saveInFlight = false;
let pendingSaveAfter = false;

function saveState() {
  // 連打対策：短時間の連続呼び出しは1回にまとめる
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    doSave();
  }, 350);
}

async function doSave(retryCount = 0) {
  if (saveInFlight) {
    pendingSaveAfter = true;
    return;
  }
  saveInFlight = true;
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
    flashSaved();
  } catch (e) {
    console.error("保存失敗", e);
    if (retryCount < 2) {
      setTimeout(() => doSave(retryCount + 1), 600);
    } else {
      flashError();
    }
  } finally {
    saveInFlight = false;
    if (pendingSaveAfter) {
      pendingSaveAfter = false;
      setTimeout(() => doSave(), 300);
    }
  }
}

function flashError() {
  const el = document.getElementById("savedFlash");
  el.textContent = "保存できんかった…もう一回タップしてみてな";
  el.style.color = "#e07a5f";
  el.classList.add("show");
  setTimeout(() => {
    el.classList.remove("show");
    setTimeout(() => {
      el.textContent = "保存したで✓";
      el.style.color = "var(--accent)";
    }, 350);
  }, 2200);
}

function flashSaved() {
  const el = document.getElementById("savedFlash");
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 700);
}

function rowCheckedCount(r) {
  let n = 0;
  for (let c = 0; c < state.colCount; c++) {
    if (state.checked[r + "_" + c]) n++;
  }
  return n;
}

function colCheckedCount(c) {
  let n = 0;
  state.rows.forEach((_, r) => {
    if (state.checked[r + "_" + c]) n++;
  });
  return n;
}

function totalCheckedCount() {
  return Object.keys(state.checked).length;
}

// 明るい色なら文字を濃くする
function isLight(hex) {
  const h = hex.replace("#", "");
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 150;
}

function render() {
  const table = document.getElementById("grid");
  table.innerHTML = "";

  // header row
  const thead = document.createElement("tr");
  const corner = document.createElement("th");
  corner.className = "corner";
  thead.appendChild(corner);
  for (let c = 0; c < state.colCount; c++) {
    const th = document.createElement("th");
    const cCount = colCheckedCount(c);
    th.innerHTML = `${c + 1}
      <span class="col-count">${cCount > 0 ? cCount : ""}</span>
      <div class="del-col" onclick="deleteColumn(${c})">×</div>`;
    thead.appendChild(th);
  }
  table.appendChild(thead);

  // data rows
  state.rows.forEach((row, r) => {
    const tr = document.createElement("tr");
    const th = document.createElement("th");
    th.className = "row-head";
    const count = rowCheckedCount(r);
    const pct = state.colCount > 0 ? Math.round((count / state.colCount) * 100) : 0;
    th.innerHTML = `
      <div class="row-head-top">
        <input type="color" class="swatch" value="${row.hex}" onchange="recolorRow(${r}, this.value)">
        <input class="name-input" value="${row.name}" onchange="renameRow(${r}, this.value)">
        <span class="row-count">${count}</span>
        <span class="move-btn ${reorderMode ? "" : "hidden"}" onclick="moveRow(${r}, -1)">▲</span>
        <span class="move-btn ${reorderMode ? "" : "hidden"}" onclick="moveRow(${r}, 1)">▼</span>
        <span class="del-row" onclick="deleteRow(${r})">×</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%; background:${row.hex}"></div>
      </div>`;
    tr.appendChild(th);

    for (let c = 0; c < state.colCount; c++) {
      const td = document.createElement("td");
      td.className = "cell";
      const key = r + "_" + c;
      const isChecked = !!state.checked[key];
      if (isChecked) {
        td.classList.add("checked");
        const textColor = isLight(row.hex) ? "#1a1410" : "#f0ece4";
        td.innerHTML = `<div class="box" style="background:${row.hex}; color:${textColor}">✓</div>`;
      } else {
        td.innerHTML = `<div class="box">✓</div>`;
      }
      td.onclick = () => toggleCell(r, c);
      tr.appendChild(td);
    }
    table.appendChild(tr);
  });

  document.getElementById("totalCount").textContent = totalCheckedCount();

  const colInput = document.getElementById("colCountInput");
  if (colInput && document.activeElement !== colInput) {
    colInput.value = state.colCount;
  }
}

function toggleCell(r, c) {
  const key = r + "_" + c;
  if (state.checked[key]) {
    delete state.checked[key];
  } else {
    state.checked[key] = true;
  }
  render();
  saveState();
}

function addColumn() {
  state.colCount += 1;
  render();
  saveState();
}

function setColCount() {
  const input = document.getElementById("colCountInput");
  let n = parseInt(input.value, 10);
  if (isNaN(n) || n < 1) n = 1;
  if (n > 200) n = 200;

  if (n < state.colCount) {
    // 減らす場合：消える列のチェックを削除
    const newChecked = {};
    Object.keys(state.checked).forEach(key => {
      const [r, col] = key.split("_").map(Number);
      if (col < n) newChecked[key] = true;
    });
    state.checked = newChecked;
  }
  state.colCount = n;
  render();
  saveState();
}

function deleteColumn(c) {
  if (state.colCount <= 1) return;
  state.colCount -= 1;
  const newChecked = {};
  Object.keys(state.checked).forEach(key => {
    const [r, col] = key.split("_").map(Number);
    if (col === c) return;
    const newCol = col > c ? col - 1 : col;
    newChecked[r + "_" + newCol] = true;
  });
  state.checked = newChecked;
  render();
  saveState();
}

function addRow() {
  state.rows.push({ name: "新色", hex: "#888888" });
  render();
  saveState();
}

function toggleReorderMode() {
  reorderMode = !reorderMode;
  document.getElementById("reorderBtn").classList.toggle("active", reorderMode);
  render();
}

function moveRow(r, dir) {
  const target = r + dir;
  if (target < 0 || target >= state.rows.length) return;

  // 行の並び替え
  const tmp = state.rows[r];
  state.rows[r] = state.rows[target];
  state.rows[target] = tmp;

  // チェックデータも一緒にスワップ
  const newChecked = {};
  Object.keys(state.checked).forEach(key => {
    const [row, col] = key.split("_").map(Number);
    let newRow = row;
    if (row === r) newRow = target;
    else if (row === target) newRow = r;
    newChecked[newRow + "_" + col] = true;
  });
  state.checked = newChecked;

  render();
  saveState();
}

function deleteRow(r) {
  state.rows.splice(r, 1);
  const newChecked = {};
  Object.keys(state.checked).forEach(key => {
    const [row, col] = key.split("_").map(Number);
    if (row === r) return;
    const newRow = row > r ? row - 1 : row;
    newChecked[newRow + "_" + col] = true;
  });
  state.checked = newChecked;
  render();
  saveState();
}

function renameRow(r, name) {
  state.rows[r].name = name;
  saveState();
}

function recolorRow(r, hex) {
  state.rows[r].hex = hex;
  render();
  saveState();
}

function resetAll() {
  if (!confirm("ほんまに全部消すで？元に戻せへんで。")) return;
  state = defaultState();
  render();
  saveState();
}

(async function init() {
  await loadState();
  render();
})();
</script>

</body>
</html>
