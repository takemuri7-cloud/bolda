<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課題チェック表</title>
<style>
  :root {
    --bg: #1a1816;
    --panel: #242120;
    --line: #3a3633;
    --text: #f0ece4;
    --sub: #9a948c;
    --accent: #e8a33d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    padding: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 4px;
    letter-spacing: 0.02em;
  }
  .sub {
    color: var(--sub);
    font-size: 12px;
    margin-bottom: 10px;
  }
  .summary {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
    flex-wrap: wrap;
  }
  .summary .big {
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
  }
  .summary .label {
    font-size: 12px;
    color: var(--sub);
  }
  .today-summary {
    font-size: 12px;
    color: var(--accent);
    margin-left: 6px;
  }
  .scroll-today-btn {
    margin-left: auto;
    background: var(--bg);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  button:active { background: #2e2a27; }
  button.danger { color: #e07a5f; border-color: #5a3a32; }
  button.primary { background: var(--accent); color: #1a1410; border: none; font-weight: 600; }
  #reorderBtn.active {
    background: var(--accent);
    color: #1a1410;
    border-color: var(--accent);
    font-weight: 600;
  }
  .col-set-label {
    font-size: 13px;
    color: var(--sub);
  }
  .count-input, .date-input {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
  }
  .count-input { width: 60px; }
  .preset-toolbar {
    margin-top: -4px;
  }
  .preset-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .preset-chip .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .import-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 14px;
  }
  .import-box textarea {
    width: 100%;
    height: 90px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px;
    font-size: 11px;
    font-family: monospace;
    resize: vertical;
    box-sizing: border-box;
  }
  .import-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .scroll-wrap {
    overflow-x: auto;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--panel);
  }
  table {
    border-collapse: collapse;
    min-width: 100%;
  }
  th, td {
    border-bottom: 1px solid var(--line);
    border-right: 1px solid var(--line);
    text-align: center;
    padding: 0;
  }

  /* 色ヘッダー（横方向、上に固定） */
  th.color-head {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--panel);
    padding: 6px 6px;
    min-width: 64px;
    vertical-align: top;
  }
  .color-head-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    flex-wrap: wrap;
  }
  .swatch {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: none;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
  }
  .name-input {
    background: transparent;
    border: none;
    color: var(--text);
    width: 32px;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    padding: 0;
  }
  .note-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--line);
    color: var(--sub);
    width: 100%;
    font-size: 9px;
    text-align: center;
    padding: 1px 0;
    margin-top: 2px;
  }
  .note-input:focus {
    outline: none;
    border-bottom-color: var(--accent);
  }
  .row-count {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
  }
  .progress-track {
    height: 4px;
    background: #3a3633;
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.25s;
  }
  .color-actions {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 3px;
  }
  .move-btn {
    color: var(--sub);
    font-size: 11px;
    cursor: pointer;
    line-height: 1;
  }
  .move-btn:active { color: var(--accent); }
  .move-btn.hidden { display: none; }
  .del-row, .del-col {
    color: var(--sub);
    font-size: 11px;
    cursor: pointer;
    line-height: 1;
  }

  /* 日付/課題ヘッダー（縦方向、左に固定） */
  .corner {
    position: sticky;
    left: 0;
    top: 0;
    z-index: 3;
    background: #2a2724;
  }
  th.date-head {
    position: sticky;
    left: 0;
    z-index: 1;
    background: #2a2724;
    padding: 6px 8px;
    min-width: 72px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .date-head .col-date {
    font-weight: 700;
    font-size: 13px;
  }
  .date-head .col-weekday {
    font-size: 10px;
    margin-left: 3px;
  }
  .col-weekday.sun { color: #e85d4d; }
  .col-weekday.sat { color: #3d8be8; }
  .date-head .col-count {
    font-size: 10px;
    color: var(--accent);
    font-weight: 700;
    margin-left: 4px;
  }
  .date-head .today-tag {
    display: inline-block;
    font-size: 8px;
    color: var(--accent);
    font-weight: 700;
    margin-right: 3px;
  }

  /* 今日の行を強調（横全体） */
  th.today-row, td.today-row {
    border-top: 2px solid var(--accent);
    border-bottom: 2px solid var(--accent);
  }
  th.today-row {
    background: #3a3020;
  }

  .cell {
    width: 46px;
    height: 44px;
    cursor: pointer;
  }
  .cell .box {
    width: 30px;
    height: 30px;
    margin: 0 auto;
    border-radius: 6px;
    border: 1.5px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: transparent;
  }
  .cell.checked .box {
    border-width: 0;
    color: #1a1410;
  }

  .footer {
    margin-top: 10px;
    font-size: 12px;
    color: var(--sub);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .saved-flash {
    color: var(--sub);
    font-size: 12px;
  }
</style>
</head>
<body>

<h1>🧗 課題チェック表</h1>
<div class="sub">タップでチェックON/OFF。色の丸タップで色変更。自動保存されるで。</div>

<div class="summary">
  <span class="big" id="totalCount">0</span>
  <span class="label">本 完登</span>
  <span class="today-summary" id="todaySummary"></span>
  <button class="scroll-today-btn" onclick="scrollToToday()">📍今日へ</button>
</div>

<div class="toolbar">
  <button class="primary" onclick="addColumn()">＋日付/課題を追加</button>
  <button onclick="addRow()">＋色（列）を追加</button>
  <button class="danger" onclick="resetAll()">全部リセット</button>
  <button id="reorderBtn" onclick="toggleReorderMode()">↔ 並び替え</button>
  <button onclick="sortStandardOrder()">易→難に並び替え</button>
</div>
<div class="toolbar preset-toolbar" id="presetToolbar"></div>

<div class="toolbar">
  <span class="col-set-label">開始日</span>
  <input type="date" id="startDateInput" class="date-input">
  <button class="primary" onclick="fillDates()">日付を自動入力</button>
  <button onclick="clearDates()">日付を消す</button>
</div>
<div class="toolbar">
  <span class="col-set-label">課題数を</span>
  <input type="number" id="colCountInput" class="count-input" min="1" max="200">
  <span class="col-set-label">個に設定</span>
  <button class="primary" onclick="setColCount()">設定する</button>
</div>
<div class="toolbar">
  <button onclick="exportData()">📋 データを書き出す</button>
  <button onclick="toggleImportBox()">📥 データを読み込む</button>
</div>
<div id="importBox" class="import-box" style="display:none;">
  <textarea id="importTextarea" placeholder="ここにコピーしたデータを貼り付けてな"></textarea>
  <div class="import-actions">
    <button class="primary" onclick="importData()">読み込む</button>
    <button onclick="toggleImportBox()">閉じる</button>
  </div>
</div>
<div id="exportBox" class="import-box" style="display:none;">
  <textarea id="exportTextarea" readonly></textarea>
  <div class="import-actions">
    <button onclick="copyExportText()">コピーする</button>
    <button onclick="document.getElementById('exportBox').style.display='none'">閉じる</button>
  </div>
</div>

<div class="scroll-wrap">
  <table id="grid"></table>
</div>

<div class="footer">
  <button onclick="manualSave()">💾 今すぐ保存</button>
  <span class="saved-flash" id="savedFlash">保存したで✓</span>
</div>

<script>
const DEFAULT_COLORS = [
  { name: "緑", hex: "#3fae4d" },
  { name: "黄", hex: "#e8d44d" },
  { name: "橙", hex: "#e8893d" },
  { name: "紫", hex: "#9b59b6" },
  { name: "青", hex: "#3d8be8" },
  { name: "赤", hex: "#e85d4d" },
];
const STANDARD_ORDER = [
  { name: "白", hex: "#f0ece4" },
  { name: "緑", hex: "#3fae4d" },
  { name: "黄", hex: "#e8d44d" },
  { name: "橙", hex: "#e8893d" },
  { name: "紫", hex: "#9b59b6" },
  { name: "青", hex: "#3d8be8" },
  { name: "赤", hex: "#e85d4d" },
  { name: "茶", hex: "#8b5a2b" },
  { name: "黒", hex: "#2a2724" },
];

const STORAGE_KEY = "boulder_grid_v3";
const OLD_KEYS = ["boulder_grid_v2", "boulder_grid_v1"];

let state = null;
let reorderMode = false;

function defaultState() {
  return {
    rows: DEFAULT_COLORS.map(c => ({ name: c.name, hex: c.hex, note: "" })),
    colCount: 16,
    colDates: [],
    checked: {}
  };
}

async function loadState() {
  try {
    const res = await window.storage.get(STORAGE_KEY, false);
    if (res && res.value) {
      state = JSON.parse(res.value);
      normalizeState();
      return;
    }
  } catch (e) { /* not found */ }

  for (const key of OLD_KEYS) {
    try {
      const old = await window.storage.get(key, false);
      if (old && old.value) {
        state = JSON.parse(old.value);
        normalizeState();
        return;
      }
    } catch (e) { /* not found */ }
  }

  state = defaultState();
}

function normalizeState() {
  if (!state.colDates) state.colDates = [];
  if (!state.rows) state.rows = [];
  state.rows.forEach(row => { if (row.note === undefined) row.note = ""; });
}

let saveTimer = null;
let saveInFlight = false;
let pendingSaveAfter = false;
let lastError = null;

function setStatus(text, color) {
  const el = document.getElementById("savedFlash");
  el.textContent = text;
  el.style.color = color;
}

function saveState() {
  setStatus("未保存…", "var(--sub)");
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { doSave(); }, 350);
}

function manualSave() {
  if (saveTimer) clearTimeout(saveTimer);
  setStatus("保存中…", "var(--sub)");
  doSave();
}

async function doSave(retryCount = 0) {
  if (saveInFlight) {
    pendingSaveAfter = true;
    return;
  }
  saveInFlight = true;
  setStatus("保存中…", "var(--sub)");
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
    lastError = null;
    setStatus("保存したで✓", "var(--accent)");
  } catch (e) {
    console.error("保存失敗", e);
    lastError = (e && e.message) ? e.message : String(e);
    if (retryCount < 2) {
      setTimeout(() => doSave(retryCount + 1), 700);
    } else {
      setStatus(`保存失敗: ${lastError}（💾で再試行してな）`, "#e07a5f");
    }
  } finally {
    saveInFlight = false;
    if (pendingSaveAfter) {
      pendingSaveAfter = false;
      setTimeout(() => doSave(), 300);
    }
  }
}

function isoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function todayIso() { return isoDate(new Date()); }

function extendDatesIfNeeded(newCount) {
  if (!state.colDates || state.colDates.length === 0) return;
  let cursor = new Date(state.colDates[state.colDates.length - 1] + "T00:00:00");
  for (let c = state.colDates.length; c < newCount; c++) {
    cursor = new Date(cursor);
    cursor.setDate(cursor.getDate() + 1);
    state.colDates.push(isoDate(cursor));
  }
}

function rowCheckedCount(r) {
  let n = 0;
  for (let c = 0; c < state.colCount; c++) {
    if (state.checked[r + "_" + c]) n++;
  }
  return n;
}
function colCheckedCount(c) {
  let n = 0;
  state.rows.forEach((_, r) => { if (state.checked[r + "_" + c]) n++; });
  return n;
}
function totalCheckedCount() { return Object.keys(state.checked).length; }

function isLight(hex) {
  const h = hex.replace("#", "");
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 150;
}

function render() {
  const table = document.getElementById("grid");
  table.innerHTML = "";

  // ヘッダー行：左上の角 + 色ごとのヘッダー（横並び）
  const thead = document.createElement("tr");
  const corner = document.createElement("th");
  corner.className = "corner";
  thead.appendChild(corner);

  state.rows.forEach((row, r) => {
    const th = document.createElement("th");
    th.className = "color-head";
    const count = rowCheckedCount(r);
    const pct = state.colCount > 0 ? Math.round((count / state.colCount) * 100) : 0;
    th.innerHTML = `
      <div class="color-head-top">
        <input type="color" class="swatch" value="${row.hex}" onchange="recolorRow(${r}, this.value)">
        <input class="name-input" value="${row.name}" onchange="renameRow(${r}, this.value)">
      </div>
      <div class="row-count">${count}</div>
      <input class="note-input" value="${row.note || ""}" placeholder="級など" onchange="renameNote(${r}, this.value)">
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%; background:${row.hex}"></div>
      </div>
      <div class="color-actions">
        <span class="move-btn ${reorderMode ? "" : "hidden"}" onclick="moveRow(${r}, -1)">◀</span>
        <span class="del-row" onclick="deleteRow(${r})">×</span>
        <span class="move-btn ${reorderMode ? "" : "hidden"}" onclick="moveRow(${r}, 1)">▶</span>
      </div>`;
    thead.appendChild(th);
  });
  table.appendChild(thead);

  // データ行：1行＝1課題/1日。縦に並ぶ
  for (let c = 0; c < state.colCount; c++) {
    const tr = document.createElement("tr");
    const th = document.createElement("th");
    th.className = "date-head";
    const cCount = colCheckedCount(c);
    const dateStr = state.colDates[c];
    const isToday = dateStr === todayIso();
    let dateHtml = `<span class="col-date">${c + 1}</span>`;
    if (dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      const md = `${d.getMonth() + 1}/${d.getDate()}`;
      const wd = ["日","月","火","水","木","金","土"][d.getDay()];
      const wdClass = d.getDay() === 0 ? "sun" : d.getDay() === 6 ? "sat" : "";
      dateHtml = `<span class="col-date">${md}</span><span class="col-weekday ${wdClass}">${wd}</span>`;
    }
    if (isToday) th.classList.add("today-row");
    th.innerHTML = `${isToday ? '<span class="today-tag">今日</span>' : ""}${dateHtml}
      <span class="col-count">${cCount > 0 ? cCount : ""}</span>
      <span class="del-col" onclick="deleteColumn(${c})">×</span>`;
    tr.appendChild(th);

    state.rows.forEach((row, r) => {
      const td = document.createElement("td");
      td.className = "cell";
      if (isToday) td.classList.add("today-row");
      const key = r + "_" + c;
      const isChecked = !!state.checked[key];
      if (isChecked) {
        td.classList.add("checked");
        const textColor = isLight(row.hex) ? "#1a1410" : "#f0ece4";
        td.innerHTML = `<div class="box" style="background:${row.hex}; color:${textColor}">✓</div>`;
      } else {
        td.innerHTML = `<div class="box">✓</div>`;
      }
      td.onclick = () => toggleCell(r, c);
      tr.appendChild(td);
    });
    table.appendChild(tr);
  }

  document.getElementById("totalCount").textContent = totalCheckedCount();

  const todayIdx = state.colDates.indexOf(todayIso());
  const todaySummaryEl = document.getElementById("todaySummary");
  todaySummaryEl.textContent = todayIdx !== -1 ? `今日: ${colCheckedCount(todayIdx)}本` : "";

  const colInput = document.getElementById("colCountInput");
  if (colInput && document.activeElement !== colInput) {
    colInput.value = state.colCount;
  }
}

function scrollToToday() {
  const todayTh = document.querySelector("th.today-row");
  if (!todayTh) {
    alert("日付が入ってへんか、今日の日付が表に無いみたいやで");
    return;
  }
  todayTh.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
}
function scrollToTodaySilent() {
  const todayTh = document.querySelector("th.today-row");
  if (todayTh) todayTh.scrollIntoView({ behavior: "auto", block: "center", inline: "nearest" });
}

function toggleCell(r, c) {
  const key = r + "_" + c;
  if (state.checked[key]) delete state.checked[key];
  else state.checked[key] = true;
  render();
  saveState();
}

function fillDates() {
  const input = document.getElementById("startDateInput");
  if (!input.value) { alert("開始日を選んでな"); return; }
  const start = new Date(input.value + "T00:00:00");
  const dates = [];
  for (let c = 0; c < state.colCount; c++) {
    const d = new Date(start);
    d.setDate(d.getDate() + c);
    dates.push(isoDate(d));
  }
  state.colDates = dates;
  render();
  saveState();
}
function clearDates() {
  state.colDates = [];
  render();
  saveState();
}

function exportData() {
  const box = document.getElementById("exportBox");
  const ta = document.getElementById("exportTextarea");
  ta.value = JSON.stringify(state);
  box.style.display = "block";
  document.getElementById("importBox").style.display = "none";
  ta.focus();
  ta.select();
}
function copyExportText() {
  const ta = document.getElementById("exportTextarea");
  ta.select();
  try {
    document.execCommand("copy");
    setStatus("コピーしたで✓ どっかにメモっといてな", "var(--accent)");
  } catch (e) {
    setStatus("自動コピーでけへんかった…自分で選択してコピーしてな", "#e07a5f");
  }
}
function toggleImportBox() {
  const box = document.getElementById("importBox");
  const isHidden = box.style.display === "none";
  box.style.display = isHidden ? "block" : "none";
  document.getElementById("exportBox").style.display = "none";
}
function importData() {
  const text = document.getElementById("importTextarea").value.trim();
  if (!text) return;
  try {
    const parsed = JSON.parse(text);
    if (!parsed.rows || !Array.isArray(parsed.rows)) throw new Error("形が違うで");
    if (!parsed.colDates) parsed.colDates = [];
    state = parsed;
    normalizeState();
    document.getElementById("importBox").style.display = "none";
    render();
    setStatus("読み込んだで✓（保存はまだやから💾も押してな）", "var(--accent)");
  } catch (e) {
    alert("読み込めへんかった…貼り付けた内容を確認してな\n" + e.message);
  }
}

function addColumn() {
  state.colCount += 1;
  extendDatesIfNeeded(state.colCount);
  render();
  saveState();
}

function setColCount() {
  const input = document.getElementById("colCountInput");
  let n = parseInt(input.value, 10);
  if (isNaN(n) || n < 1) n = 1;
  if (n > 200) n = 200;
  if (n < state.colCount) {
    const newChecked = {};
    Object.keys(state.checked).forEach(key => {
      const [r, col] = key.split("_").map(Number);
      if (col < n) newChecked[key] = true;
    });
    state.checked = newChecked;
  }
  state.colCount = n;
  if (state.colDates && state.colDates.length > n) {
    state.colDates = state.colDates.slice(0, n);
  } else {
    extendDatesIfNeeded(n);
  }
  render();
  saveState();
}

function deleteColumn(c) {
  if (state.colCount <= 1) return;
  const cCount = colCheckedCount(c);
  if (cCount > 0 && !confirm(`この課題、${cCount}本チェック入ってるで。ほんまに消す?`)) return;
  state.colCount -= 1;
  const newChecked = {};
  Object.keys(state.checked).forEach(key => {
    const [r, col] = key.split("_").map(Number);
    if (col === c) return;
    const newCol = col > c ? col - 1 : col;
    newChecked[r + "_" + newCol] = true;
  });
  state.checked = newChecked;
  if (state.colDates && state.colDates.length) state.colDates.splice(c, 1);
  render();
  saveState();
}

function addRow() {
  state.rows.push({ name: "新色", hex: "#888888", note: "" });
  render();
  saveState();
}

function renderPresetToolbar() {
  const box = document.getElementById("presetToolbar");
  if (!box) return;
  box.innerHTML = STANDARD_ORDER.map(c =>
    `<span class="preset-chip" onclick="addPresetRow('${c.name}', '${c.hex}')">
      <span class="dot" style="background:${c.hex}; border:1px solid var(--line)"></span>${c.name}
    </span>`
  ).join("");
}
function addPresetRow(name, hex) {
  state.rows.push({ name, hex, note: "" });
  render();
  saveState();
}
function sortStandardOrder() {
  const orderIndex = name => {
    const idx = STANDARD_ORDER.findIndex(c => c.name === name);
    return idx === -1 ? 999 : idx;
  };
  const oldRows = state.rows.map((row, i) => ({ row, oldIndex: i }));
  oldRows.sort((a, b) => orderIndex(a.row.name) - orderIndex(b.row.name));
  const newChecked = {};
  oldRows.forEach((item, newIndex) => {
    for (let c = 0; c < state.colCount; c++) {
      const key = item.oldIndex + "_" + c;
      if (state.checked[key]) newChecked[newIndex + "_" + c] = true;
    }
  });
  state.rows = oldRows.map(item => item.row);
  state.checked = newChecked;
  render();
  saveState();
}

function toggleReorderMode() {
  reorderMode = !reorderMode;
  document.getElementById("reorderBtn").classList.toggle("active", reorderMode);
  render();
}

function moveRow(r, dir) {
  const target = r + dir;
  if (target < 0 || target >= state.rows.length) return;
  const tmp = state.rows[r];
  state.rows[r] = state.rows[target];
  state.rows[target] = tmp;
  const newChecked = {};
  Object.keys(state.checked).forEach(key => {
    const [row, col] = key.split("_").map(Number);
    let newRow = row;
    if (row === r) newRow = target;
    else if (row === target) newRow = r;
    newChecked[newRow + "_" + col] = true;
  });
  state.checked = newChecked;
  render();
  saveState();
}

function deleteRow(r) {
  const count = rowCheckedCount(r);
  const label = state.rows[r] ? state.rows[r].name : "";
  if (!confirm(`「${label}」を消すで。${count > 0 ? count + "本のチェックも一緒に消えるで。" : ""}ほんまにいい?`)) return;
  state.rows.splice(r, 1);
  const newChecked = {};
  Object.keys(state.checked).forEach(key => {
    const [row, col] = key.split("_").map(Number);
    if (row === r) return;
    const newRow = row > r ? row - 1 : row;
    newChecked[newRow + "_" + col] = true;
  });
  state.checked = newChecked;
  render();
  saveState();
}

function renameRow(r, name) {
  state.rows[r].name = name;
  saveState();
}
function renameNote(r, note) {
  state.rows[r].note = note;
  saveState();
}
function recolorRow(r, hex) {
  state.rows[r].hex = hex;
  render();
  saveState();
}

function resetAll() {
  if (!confirm("ほんまに全部消すで？元に戻せへんで。")) return;
  state = defaultState();
  render();
  saveState();
}

(async function init() {
  await loadState();
  render();
  renderPresetToolbar();
  const startInput = document.getElementById("startDateInput");
  if (startInput && !startInput.value) startInput.value = todayIso();
  setTimeout(scrollToTodaySilent, 100);
})();
</script>

</body>
</html>
